# Universal Auth Nginx Configuration for *.nuru.tools (Simplified)
# Handles Apple biometric authentication across all subdomains

# Upstream for universal auth service
upstream universal_auth_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# Main server block for *.nuru.tools with universal auth
server {
    listen 443 ssl http2;
    server_name *.nuru.tools nuru.tools;
    
    # SSL Configuration (use wildcard certificate)
    ssl_certificate /etc/ssl/certs/nuru.tools.crt;
    ssl_certificate_key /etc/ssl/private/nuru.tools.key;
    
    # SSL Security Headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS for all subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Security headers for universal auth
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    
    # CSP for enhanced security with WebAuthn support
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.nuru.tools wss://*.nuru.tools; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
    
    # Set subdomain variable
    set $subdomain "";
    if ($host ~* "^([^.]+)\.nuru\.tools$") {
        set $subdomain $1;
    }
    if ($host = "nuru.tools") {
        set $subdomain "www";
    }
    
    # Pass subdomain info to applications
    proxy_set_header X-Subdomain $subdomain;
    proxy_set_header X-Original-Host $host;
    
    # Universal auth endpoints (available on all subdomains)
    location /api/universal-auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        
        proxy_pass http://universal_auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;
        proxy_cache_bypass $http_upgrade;
        
        # CORS headers for WebAuthn
        add_header Access-Control-Allow-Origin "https://$host" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://$host" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Universal auth page (available on all subdomains)
    location /auth {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://universal_auth_backend/universal-auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;
    }
    
    # Subdomain-specific application routing (simplified)
    location / {
        # Route to subdomain-specific applications
        if ($subdomain = "dashboard") {
            proxy_pass http://127.0.0.1:3002;
        }
        if ($subdomain = "analytics") {
            proxy_pass http://127.0.0.1:3003;
        }
        if ($subdomain = "oracle") {
            proxy_pass http://127.0.0.1:3004;
        }
        if ($subdomain = "api") {
            proxy_pass http://127.0.0.1:3005;
        }
        
        # Default routing (main site)
        proxy_pass http://127.0.0.1:3000;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;
        proxy_set_header X-Original-Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files for auth system
    location /auth-assets/ {
        alias /var/www/universal-auth/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        gzip_static on;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
        return 200 "User-agent: *\nDisallow: /auth\nDisallow: /api/\n";
        add_header Content-Type text/plain;
    }
    
    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
    
    # Deny access to sensitive files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to auth config files
    location ~ /(auth\.conf|\.env|\.htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP to HTTPS redirect for all subdomains
server {
    listen 80;
    server_name *.nuru.tools nuru.tools;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Log format for universal auth
log_format universal_auth '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'subdomain="$subdomain" host="$host"';

# Access and error logs
access_log /var/log/nginx/universal_auth_access.log universal_auth;
error_log /var/log/nginx/universal_auth_error.log warn;